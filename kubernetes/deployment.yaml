---
# ── Namespace ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: checkov-demo

---
# ── Deployment (mix of correct and misconfigured settings) ─────────────────
# Checkov will flag:
#   CKV_K8S_28  – container runs as root (runAsNonRoot: false)
#   CKV_K8S_30  – no resource limits defined
#   CKV_K8S_8   – liveness probe missing
#   CKV_K8S_43  – image tag is "latest" (not pinned)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: checkov-demo
  labels:
    app: checkov-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkov-demo
  template:
    metadata:
      labels:
        app: checkov-demo
    spec:
      # ✅  CKV_K8S_36 – automount disabled at pod level
      automountServiceAccountToken: false

      containers:
        - name: app
          # ⚠️  CKV_K8S_43 – latest tag; pin to a digest in production
          image: nginx:latest

          ports:
            - containerPort: 8080

          # ⚠️  CKV_K8S_30 – no resource limits; node starvation risk
          # resources:
          #   requests:
          #     cpu: "100m"
          #     memory: "128Mi"
          #   limits:
          #     cpu: "250m"
          #     memory: "256Mi"

          securityContext:
            # ⚠️  CKV_K8S_28 – container is allowed to run as root
            runAsNonRoot: false
            # ✅  CKV_K8S_31 – drops all Linux capabilities
            capabilities:
              drop: ["ALL"]
            # ✅  CKV_K8S_32 – read-only root filesystem
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false   # ✅  CKV_K8S_20

          # ✅  CKV_K8S_9 – readiness probe present
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          # ⚠️  CKV_K8S_8 – liveness probe is missing; add it below in prod
          # livenessProbe:
          #   httpGet:
          #     path: /healthz
          #     port: 8080
          #   initialDelaySeconds: 15
          #   periodSeconds: 20

          env:
            - name: APP_ENV
              value: "production"

---
# ── Service ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: checkov-demo
spec:
  selector:
    app: checkov-demo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP   # ✅  not NodePort or LoadBalancer – internal only
